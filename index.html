<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Homelab Dashboard</title>

    <link data-trunk rel="rust" data-bin="rust-playground" />

    <style>
      * {
        box-sizing: border-box;
      }

      :root,
      html[data-theme="light"] {
        --bg: #ffffff;
        --text: #111111;
        --muted-text: #555555;
        --border: #dddddd;
        --button-bg: #ffffff;
        --hover-bg: #f0f0f0;
        --active-bg: #d9d9d9;
        --active-hover-bg: #d0d0d0;
        --table-header-bg: #f5f5f5;
        --active-border: #888888;
      }

      html[data-theme="dark"] {
        --bg: #181818;
        --text: #eeeeee;
        --muted-text: #aaaaaa;
        --border: #3a3a3a;
        --button-bg: #242424;
        --hover-bg: #2f2f2f;
        --active-bg: #3a3a3a;
        --active-hover-bg: #444444;
        --table-header-bg: #242424;
        --active-border: #aaaaaa;
      }

      @media (prefers-color-scheme: dark) {
        html[data-theme="system"] {
          --bg: #181818;
          --text: #eeeeee;
          --muted-text: #aaaaaa;
          --border: #3a3a3a;
          --button-bg: #242424;
          --hover-bg: #2f2f2f;
          --active-bg: #3a3a3a;
          --active-hover-bg: #444444;
          --table-header-bg: #242424;
          --active-border: #aaaaaa;
        }
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        min-height: 100vh;
      }

      button {
        font: inherit;
        cursor: pointer;
        color: inherit;
      }

      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }

      .login-card {
        width: 100%;
        max-width: 24rem;
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: var(--button-bg);
        text-align: center;
      }

      .login-card h1 {
        margin: 0 0 0.5rem 0;
        font-size: 1.5rem;
      }

      .login-card p {
        margin: 0 0 1.5rem 0;
        color: var(--muted-text);
      }

      .primary-button,
      .secondary-button,
      .icon-button {
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: var(--button-bg);
        padding: 0.6rem 0.9rem;
      }

      .primary-button {
        font-size: 1.1rem;
        padding: 0.8rem 1.4rem;
      }

      .app-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .app-header {
        height: 4rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        border-bottom: 1px solid var(--border);
      }

      .header-left,
      .header-right {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .header-left h1 {
        margin: 0;
        font-size: 1.25rem;
      }

      .user-label {
        font-size: 0.9rem;
        color: var(--muted-text);
      }

      .app-body {
        flex: 1;
        min-height: 0;
        display: flex;
        height: calc(100vh - 4rem);
      }

      .side-menu {
        border-right: 1px solid var(--border);
        transition: width 150ms ease;
        overflow: hidden;
        position: relative;
      }

      .side-menu.open {
        width: 16rem;
      }

      .side-menu.closed {
        width: 0;
      }

      .side-menu-content {
        width: 16rem;
        height: 100%;
        padding: 1rem;
        display: flex;
        flex-direction: column;
      }

      .side-menu nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding-bottom: 3rem;
      }

      .theme-selector {
        position: absolute;
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        display: flex;
        gap: 0.4rem;
      }

      .theme-button {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: transparent;
        padding: 0.45rem 0.35rem;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .theme-button:hover {
        background: var(--hover-bg);
      }

      .theme-button.active {
        background: var(--active-bg);
        border-color: var(--active-border);
      }

      .menu-item {
        width: 100%;
        border: 0;
        border-radius: 0.5rem;
        background: transparent;
        color: inherit;
        text-align: left;
        padding: 0.65rem 0.75rem;
        transition:
          background-color 120ms ease,
          border-color 120ms ease;
        border-left: 4px solid transparent;
      }

      .menu-item:hover {
        background: var(--hover-bg);
      }

      .menu-item.active {
        background: var(--active-bg);
        border-left-color: var(--active-border);
        font-weight: 600;
      }

      .menu-item.active:hover {
        background: var(--active-hover-bg);
      }

      .page-content {
        flex: 1;
        min-width: 0;
        padding: 1.5rem;
        overflow: auto;
      }

      .status-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }

      .status-table th,
      .status-table td {
        border-bottom: 1px solid var(--border);
        padding: 0.6rem 0.75rem;
        text-align: left;
      }

      .status-table th {
        background: var(--table-header-bg);
        font-weight: 600;
      }

      .status-pill {
        display: inline-block;
        min-width: 4.5rem;
        border-radius: 999px;
        padding: 0.2rem 0.55rem;
        text-align: center;
        font-size: 0.85rem;
        font-weight: 600;
      }

      .status-pill.up {
        background: #d9f2dd;
        color: #176b2c;
      }

      .status-pill.mixed {
        background: #fff0c2;
        color: #7a5200;
      }

      .status-pill.down {
        background: #f8d7da;
        color: #842029;
      }

      .status-pill.unknown {
        background: #e5e5e5;
        color: #555;
      }
    </style>
  </head>

  <body></body>
</html>

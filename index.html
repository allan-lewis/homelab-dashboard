<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Homelab Dashboard</title>

    <link data-trunk rel="rust" data-bin="rust-playground" />

    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
      }

      button {
        font: inherit;
        cursor: pointer;
      }

      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .primary-button,
      .secondary-button,
      .icon-button {
        border: 1px solid #ccc;
        border-radius: 0.5rem;
        background: white;
        padding: 0.6rem 0.9rem;
      }

      .primary-button {
        font-size: 1.1rem;
        padding: 0.8rem 1.4rem;
      }

      .app-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .app-header {
        height: 4rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        border-bottom: 1px solid #ddd;
      }

      .header-left,
      .header-right {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .header-left h1 {
        margin: 0;
        font-size: 1.25rem;
      }

      .user-label {
        font-size: 0.9rem;
        color: #555;
      }

      .app-body {
        flex: 1;
        min-height: 0;
        display: flex;
      }

      .side-menu {
        border-right: 1px solid #ddd;
        transition: width 150ms ease;
        overflow: hidden;
      }

      .side-menu.open {
        width: 16rem;
      }

      .side-menu.closed {
        width: 0;
      }

      .side-menu nav {
        width: 16rem;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .menu-item {
        width: 100%;
        border: 0;
        border-radius: 0.5rem;
        background: transparent;
        color: inherit;
        text-align: left;
        padding: 0.65rem 0.75rem;
        transition:
          background-color 120ms ease,
          border-color 120ms ease;
        border-left: 4px solid transparent;
      }

      .menu-item:hover {
        background: #f0f0f0;
      }

      .menu-item.active {
        background: #d9d9d9;
        border-left-color: #888;
        font-weight: 600;
      }

      .menu-item.active:hover {
        background: #d0d0d0;
      }

      .page-content {
        flex: 1;
        min-width: 0;
        padding: 1.5rem;
        overflow: auto;
      }

      .status-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }

      .status-table th,
      .status-table td {
        border-bottom: 1px solid #ddd;
        padding: 0.6rem 0.75rem;
        text-align: left;
      }

      .status-table th {
        background: #f5f5f5;
        font-weight: 600;
      }
    </style>
  </head>

  <body></body>
</html>

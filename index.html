<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Homelab Dashboard</title>

    <link data-trunk rel="rust" data-bin="homelab-dashboard" />
    <link data-trunk rel="copy-file" href="authentik.png" />

    <style>
      * {
        box-sizing: border-box;
      }

      :root,
      html[data-theme="light"] {
        --bg: #ffffff;
        --text: #111111;
        --muted-text: #555555;
        --border: #dddddd;
        --button-bg: #ffffff;
        --hover-bg: #f0f0f0;
        --active-bg: #d9d9d9;
        --active-hover-bg: #d0d0d0;
        --table-header-bg: #f5f5f5;
        --active-border: #888888;
      }

      html[data-theme="dark"] {
        --bg: #181818;
        --text: #eeeeee;
        --muted-text: #aaaaaa;
        --border: #3a3a3a;
        --button-bg: #242424;
        --hover-bg: #2f2f2f;
        --active-bg: #3a3a3a;
        --active-hover-bg: #444444;
        --table-header-bg: #242424;
        --active-border: #aaaaaa;
      }

      @media (prefers-color-scheme: dark) {
        html[data-theme="system"] {
          --bg: #181818;
          --text: #eeeeee;
          --muted-text: #aaaaaa;
          --border: #3a3a3a;
          --button-bg: #242424;
          --hover-bg: #2f2f2f;
          --active-bg: #3a3a3a;
          --active-hover-bg: #444444;
          --table-header-bg: #242424;
          --active-border: #aaaaaa;
        }
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        font-family: system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      body {
        min-height: 100vh;
      }

      button {
        font: inherit;
        cursor: pointer;
        color: inherit;
      }

      .login-page {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
      }

      .login-card {
        width: 100%;
        max-width: 28rem;
        padding: 2rem;
        border: 1px solid var(--border);
        border-radius: 0.75rem;
        background: var(--button-bg);
        text-align: center;
      }

      .login-card h1 {
        margin: 0 0 0.5rem 0;
        font-size: 1.5rem;
      }

      .login-card p {
        margin: 0 0 1.5rem 0;
        color: var(--muted-text);
      }

      .login-button {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
      }

      .authentik-logo {
        width: 1rem;
        height: 1rem;
        object-fit: contain;
        flex-shrink: 0;
      }

      .primary-button,
      .secondary-button,
      .icon-button {
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: var(--button-bg);
        padding: 0.6rem 0.9rem;
      }

      .primary-button {
        font-size: 1.1rem;
        padding: 0.8rem 1.4rem;
      }

      .app-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .app-header {
        height: 4rem;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 1rem;
        border-bottom: 1px solid var(--border);
      }

      .header-left,
      .header-right {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .header-left h1 {
        margin: 0;
        font-size: 1.25rem;
      }

      .user-label {
        font-size: 0.9rem;
        color: var(--muted-text);
      }

      .app-body {
        flex: 1;
        min-height: 0;
        display: flex;
        height: calc(100vh - 4rem);
      }

      .side-menu {
        border-right: 1px solid var(--border);
        transition: width 150ms ease;
        overflow: hidden;
        position: relative;
      }

      .side-menu.open {
        width: 16rem;
      }

      .side-menu.closed {
        width: 0;
      }

      .side-menu-content {
        width: 16rem;
        height: 100%;
        padding: 1rem;
        display: flex;
        flex-direction: column;
      }

      .side-menu nav {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
        padding-bottom: 3rem;
      }

      .theme-selector {
        position: absolute;
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        display: flex;
        gap: 0.4rem;
      }

      .theme-button {
        flex: 1;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        background: transparent;
        padding: 0.45rem 0.35rem;
        font-size: 0.7rem;
        font-weight: 600;
        letter-spacing: 0.03em;
      }

      .theme-button:hover {
        background: var(--hover-bg);
      }

      .theme-button.active {
        background: var(--active-bg);
        border-color: var(--active-border);
      }

      .menu-item {
        width: 100%;
        border: 0;
        border-radius: 0.5rem;
        background: transparent;
        color: inherit;
        text-align: left;
        padding: 0.65rem 0.75rem;
        transition:
          background-color 120ms ease,
          border-color 120ms ease;
        border-left: 4px solid transparent;
      }

      .menu-item:hover {
        background: var(--hover-bg);
      }

      .menu-item.active {
        background: var(--active-bg);
        border-left-color: var(--active-border);
        font-weight: 600;
      }

      .menu-item.active:hover {
        background: var(--active-hover-bg);
      }

      .page-content {
        flex: 1;
        min-width: 0;
        padding: 1.5rem;
        overflow: auto;
      }

      .status-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 1rem;
      }

      .status-table th,
      .status-table td {
        border-bottom: 1px solid var(--border);
        padding: 0.6rem 0.75rem;
        text-align: left;
      }

      .status-table th {
        background: var(--table-header-bg);
        font-weight: 600;
      }

      .status-pill {
        display: inline-block;
        padding: 0.2rem 0.6rem;
        border-radius: 9999px;
        font-size: 0.85rem;
        font-weight: 600;
        border: 1px solid transparent;
      }

      .status-pill.up {
        background: rgba(34, 197, 94, 0.15);
        color: rgb(21, 128, 61);
        border-color: rgba(34, 197, 94, 0.35);
      }

      .status-pill.warning {
        background: rgba(234, 179, 8, 0.15);
        color: rgb(202, 138, 4);
        border-color: rgba(234, 179, 8, 0.35);
      }

      .status-pill.mixed {
        background: rgba(234, 179, 8, 0.15);
        color: rgb(202, 138, 4);
        border-color: rgba(234, 179, 8, 0.35);
      }

      .status-pill.down {
        background: rgba(239, 68, 68, 0.15);
        color: rgb(185, 28, 28);
        border-color: rgba(239, 68, 68, 0.35);
      }

      .status-pill.unknown {
        background: rgba(107, 114, 128, 0.15);
        color: rgb(75, 85, 99);
        border-color: rgba(107, 114, 128, 0.35);
      }

      .status-pill.info {
        background: rgba(59, 130, 246, 0.15);
        color: rgb(29, 78, 216);
        border-color: rgba(59, 130, 246, 0.35);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 1rem;
        margin-top: 1.5rem;
      }

      .summary-panel {
        border: 1px solid var(--border-color);
        border-radius: 0.75rem;
        padding: 1rem;
      }

      .summary-list {
        display: grid;
        gap: 0.75rem;
      }

      .summary-line {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
      }

      .overview-summary {
        margin-top: 0.5rem;
        font-size: 1.1rem;
        opacity: 0.9;
      }

      .overview-hero {
        margin-top: 0.75rem;
        padding: 1rem;
        border: 1px solid var(--border-color);
        border-radius: 0.75rem;
      }

      .overview-summary {
        margin: 0;
        font-size: 1.2rem;
        font-weight: 600;
      }

      .overview-subsummary {
        margin: 0.35rem 0 0;
        opacity: 0.75;
      }

    .overview-status-list {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .overview-status-line {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .overview-top-grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 1rem;
      margin-top: 0.75rem;
    }

    .overview-card {
      border: 1px solid var(--border-color);
      border-radius: 0.75rem;
      padding: 1rem;
    }

    .overview-card h3 {
      margin-top: 0;
    }

    .overview-card-primary {
      margin: 0.5rem 0 0;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .overview-card-secondary {
      margin: 0.35rem 0 0;
      opacity: 0.75;
    }

    @media (max-width: 700px) {
      .overview-top-grid {
        grid-template-columns: 1fr;
      }
    }

      @media (max-width: 1100px) {
        .summary-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 700px) {
        .summary-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body></body>
</html>
